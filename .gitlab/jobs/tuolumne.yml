variables:
# Build under the NFS CI workspace instead of /dev/shm: quandary's
# /dev/shm DT_RPATH entries fail to resolve libpetsc under `flux run`.
  USE_DEV_SHM: "false"

# Override reproducer section to define project specific variables.
.tuolumne_reproducer_vars:
  script:
    - !reference [.reproducer_vars, script]

########################
# Overridden shared jobs
########################

# Override and use %% for compiler
rocmcc_6_4_3_hip:
  variables:
    SPEC: "${PROJECT_TIOGA_VARIANTS} +rocm amdgpu_target=gfx942 %%llvm-amdgpu@=6.4.3 ^hip@6.4.3 ^netlib-lapack ^cray-mpich%llvm-amdgpu ^petsc@3.24.4+kokkos+rocm amdgpu_target=gfx942 ^kokkos@4.6.02+apu+rocm cxxstd=17 amdgpu_target=gfx942 ${PROJECT_TUOLUMNE_DEPS}"
  extends: .job_on_tuolumne

rocmcc_7_2_0_hip:
  variables:
    SPEC: "${PROJECT_TUOLUMNE_VARIANTS} +rocm amdgpu_target=gfx942 %%llvm-amdgpu@=7.2.0 ^hip@7.2.0 ^netlib-lapack ^cray-mpich%llvm-amdgpu ^petsc@3.24.4+kokkos+rocm amdgpu_target=gfx942 ^kokkos@4.6.02+apu+rocm cxxstd=17 amdgpu_target=gfx942 ${PROJECT_TUOLUMNE_DEPS}"
    PETSC_TEST_OPTIONS: "${PROJECT_TUOLUMNE_PETSC_GPU_OPTIONS}"
    # Enable ROCm unified memory (XNACK) and Cray MPICH GPU-aware MPI for all
    # flux tasks — these env vars propagate into the flux tasks.
    HSA_XNACK: "1"
    MPICH_GPU_SUPPORT_ENABLED: "1"
    # Extra flags appended to the flux-run launcher for both ctest and pytest.
    # -o gpu-affinity=off lets every rank see all GPUs in the alloc, so
    # regression tests with up to 8 ranks can share the node's APUs.
    MPI_EXTRA_FLAGS: "-o gpu-affinity=off"
  extends: .job_on_tuolumne

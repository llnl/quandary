# Override reproducer section to define project specific variables.
.tuolumne_reproducer_vars:
  script:
    - !reference [.reproducer_vars, script]

########################
# Overridden shared jobs
########################

# Override and use %% for compiler
rocmcc_6_4_3_hip:
  variables:
    SPEC: "${PROJECT_TUOLUMNE_VARIANTS} +rocm amdgpu_target=gfx942 %%llvm-amdgpu@=6.4.3 ^hip@6.4.3 ^netlib-lapack ^cray-mpich ^petsc@3.24.4+kokkos+rocm amdgpu_target=gfx942 ^kokkos@4.6.02+apu+rocm cxxstd=17 amdgpu_target=gfx942 ${PROJECT_TUOLUMNE_DEPS}"
    PETSC_TEST_OPTIONS: "-vec_type kokkos -mat_type aijkokkos"
    # --env pins HSA_XNACK (ROCm unified memory) and MPICH_GPU_SUPPORT_ENABLED (Cray MPICH GPU-aware MPI) onto every task.
    # SPINDLE_FLUXOPT=off is needed to work around petsc rpath issue with /dev/shm
    MPI_EXTRA_FLAGS: "--env=HSA_XNACK=1 --env=MPICH_GPU_SUPPORT_ENABLED=1 --env=SPINDLE_FLUXOPT=off"
  extends: .job_on_tuolumne

rocmcc_7_2_0_hip:
  variables:
    ON_TUOLUMNE: "OFF"
  extends: .job_on_tuolumne

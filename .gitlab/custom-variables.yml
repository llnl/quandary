# We define the following GitLab pipeline variables:
variables:
# In some pipelines we create only one allocation shared among jobs in
# order to save time and resources. This allocation has to be uniquely
# named so that we are sure to retrieve it and avoid collisions.
  ALLOC_NAME: ${CI_PROJECT_NAME}_ci_${CI_PIPELINE_ID}

# Dane
# Arguments for top level allocation
  DANE_SHARED_ALLOC: "--exclusive --reservation=ci --time=15 --nodes=1"
# Arguments for job level allocation
  DANE_JOB_ALLOC: "--reservation=ci --overlap --nodes=1"
# Arguments for performance job allocation (dedicated allocation with no overlapping).
  DANE_PERF_ALLOC: "--exclusive --reservation=ci --time=15 --nodes=1"
# Project specific variants for dane
  PROJECT_DANE_VARIANTS: "+test"
# Project specific deps for dane
  PROJECT_DANE_DEPS: ""

# Tuolumne
# Arguments for top level allocation
# OPTIONAL: "-o per-resource.count=2" allows to get 2 jobs running on each node.
  TUOLUMNE_SHARED_ALLOC: "--queue=pci --exclusive --time-limit=30m --nodes=1 -o per-resource.count=2"
# Arguments for job level allocation
  TUOLUMNE_JOB_ALLOC: "--nodes=1 --begin-time=+5s"
# Project specific variants for Tuolumne
  PROJECT_TUOLUMNE_VARIANTS: "+test"
# Project specific deps for Tuolumne
  PROJECT_TUOLUMNE_DEPS: ""
# PETSc runtime options for GPU testing
  PROJECT_TUOLUMNE_PETSC_GPU_OPTIONS: "-vec_type kokkos -mat_type aijkokkos"
# Extra flags appended to the flux-run launcher for both ctest and pytest.
# --env pins HSA_XNACK (ROCm unified memory on MI300A) and
# MPICH_GPU_SUPPORT_ENABLED (Cray MPICH GPU-aware MPI) onto every task;
  PROJECT_TUOLUMNE_MPI_EXTRA_FLAGS: "--env=HSA_XNACK=1 --env=MPICH_GPU_SUPPORT_ENABLED=1"

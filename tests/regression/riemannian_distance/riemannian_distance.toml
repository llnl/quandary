[system]
nlevels = [2, 2]
nessential = [2, 2]
ntime = 4741
dt = 0.04218519299725796
transition_frequency = [4.94, 5.0]
selfkerr = [0.0, 0.0]
crosskerr_coupling = 0.0
dipole_coupling = 0.005
rotation_frequency = [4.970000000000001, 4.970000000000001]
decoherence = { type = "none" }
initial_condition = { type = "basis" }

[control]
parameterization = { type = "spline", num = 69 }
carrier_frequency = [
  { subsystem = 0, value = [0.030413812651490464, -0.030413812651491352] },
  { subsystem = 1, value = [0.030413812651490464, -0.030413812651491352] },
]
initialization = [
  { subsystem = 0, type = "random", amplitude = 0.0035355339059327372 },
  { subsystem = 1, type = "random", amplitude = 0.0035355339059327372 },
]
amplitude_bound = 1.0e12
zero_boundary_condition = false

[optimization]
target = { type = "gate", filename = "targetgate.dat", gate_rot_freq = [0.0, 0.0] }
objective = "Jtrace"
tolerance = { grad_abs = 0.0001, grad_rel = 1e-05, final_cost = 0.0001, infidelity = 0.0001 }
maxiter = 5
tikhonov = { coeff = 1e-05, use_x0 = false }
penalty = { leakage = 0.0, energy = 0.0, dpdm = 0.0, variation = 0.0, weightedcost = 0.0, weightedcost_width = 0.0, riemannian = 0.1, riemannian_phasefree = true }

[output]
directory = "./data_out"
#observables = ["population", "expectedEnergy", "fullstate"]
timestep_stride = 1
optimization_stride = 1

[solver]
runtype = "optimization"
usematfree = true
linearsolver = { type = "gmres", maxiter = 20 }
timestepper = "IMR"
rand_seed = 1122
